# Next.js + TypeScript + Prisma domain configuration
name: nextjs_stack
extends: base
domains:
  - nextjs
  - typescript
  - prisma
  - react

model:
  base_model_hf: "deepseek-ai/deepseek-coder-1.3b-base"
  base_model_ollama: "deepseek-coder:1.3b"
  output_name: "rem-coder-nextjs"

data:
  raw_file: "data/domains/nextjs/raw/fullstack.jsonl"
  train_file: "data/domains/nextjs/train.jsonl"
  val_file: "data/domains/nextjs/val.jsonl"
  eval_file: "data/domains/nextjs/eval.jsonl"
  train_split: 0.9
  max_length: 4096
  pack_sequences: true

training:
  backend: "unsloth"
  output_dir: "models/rem-coder-nextjs-lora"
  merged_output_dir: "models/rem-coder-nextjs-merged"
  epochs: 3
  learning_rate: 0.0001
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  load_in_4bit: true

evaluation:
  suites:
    - quality
    - executable
    - typescript
    - nextjs
  baseline_report: "models/evals/nextjs_baseline.json"
  post_train_report: "models/evals/nextjs_post_train.json"

domain_settings:
  frameworks:
    nextjs:
      version: "14"
      router: "app"
    react:
      version: "18"
    prisma:
      version: "5"
    typescript:
      version: "5"
      strict: true
