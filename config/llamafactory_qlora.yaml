### LlamaFactory QLoRA config for rem-llm
model_name_or_path: Qwen/Qwen2.5-Coder-1.5B-Instruct
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4

dataset_dir: data
dataset: rem_train
template: default
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
packing: true

output_dir: models/rem-coder-lora-lf
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1.2e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

fp16: true
report_to: none

lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all
