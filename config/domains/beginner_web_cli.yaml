# Beginner web + terminal domain configuration
name: beginner_web_cli
extends: base
project:
  name: "rem-llm"
  seed: 42
domains:
  - html
  - css
  - terminal

model:
  base_model_hf: "deepseek-ai/deepseek-coder-1.3b-base"
  base_model_ollama: "deepseek-coder:1.3b"
  output_name: "rem-coder-beginner"

data:
  raw_file: "data/domains/beginner/raw.jsonl"
  train_file: "data/domains/beginner/train.jsonl"
  val_file: "data/domains/beginner/val.jsonl"
  eval_file: "data/domains/beginner/eval.jsonl"
  train_split: 0.9
  max_length: 2048
  pack_sequences: true

training:
  backend: "unsloth"
  output_dir: "models/rem-coder-beginner-lora"
  merged_output_dir: "models/rem-coder-beginner-merged"
  epochs: 2
  learning_rate: 0.00012
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  load_in_4bit: true

evaluation:
  suites:
    - quality
    - executable
    - beginner
  baseline_report: "models/evals/beginner_baseline.json"
  post_train_report: "models/evals/beginner_post_train.json"
