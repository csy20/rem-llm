project:
  name: "rem-llm"
  seed: 42

model:
  base_model_hf: "deepseek-ai/deepseek-coder-1.3b-base"
  base_model_ollama: "deepseek-coder:1.3b"
  output_name: "rem-coder"
  teacher_model: "deepseek-coder:6.7b"

data:
  raw_file: "data/raw.jsonl"
  train_file: "data/train.jsonl"
  val_file: "data/val.jsonl"
  eval_file: "data/eval.jsonl"
  train_split: 0.9
  max_length: 4096
  pack_sequences: true
  rope_scaling: false
  rope_scaling_factor: 2.0
  rope_scaling_type: "linear"
  deduplicate: true
  perplexity_filter: false
  perplexity_threshold: 5.0

training:
  backend: "unsloth"
  output_dir: "models/rem-coder-lora"
  merged_output_dir: "models/rem-coder-merged"
  grpo_output_dir: "models/rem-coder-grpo"
  epochs: 2
  learning_rate: 0.00012
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  load_in_4bit: true
  train_on_responses_only: true
  chat_template: true
  fim_training: false
  fim_rate: 0.8
  dynamic_quantization: false
  offload_gradient_checkpointing: false
  curriculum: false
  curriculum_stages: ["easy", "intermediate", "advanced"]
  save_total_limit: 3
  logging_steps: 10

evaluation:
  baseline_report: "models/evals/baseline.json"
  post_train_report: "models/evals/post_train.json"
  baseline_exec_report: "models/evals/baseline_exec.json"
  post_train_exec_report: "models/evals/post_train_exec.json"

hardware:
  min_gpu_vram_gb_recommended: 8
