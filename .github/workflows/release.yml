name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross-compile deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: build
        run: |
          cd rem-cli
          cargo build --release --target ${{ matrix.target }}

      - name: strip
        run: strip rem-cli/target/${{ matrix.target }}/release/rem || true

      - name: package
        run: |
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          cp rem-cli/target/${{ matrix.target }}/release/rem rem-${ARCH}-linux
          chmod +x rem-${ARCH}-linux

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem-${{ matrix.target }}
          path: rem-*-linux

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build
        run: |
          cd rem-cli
          cargo build --release --target ${{ matrix.target }}

      - name: strip
        run: strip rem-cli/target/${{ matrix.target }}/release/rem || true

      - name: package
        run: |
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          cp rem-cli/target/${{ matrix.target }}/release/rem rem-${ARCH}-macos
          chmod +x rem-${ARCH}-macos

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem-${{ matrix.target }}
          path: rem-*-macos

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: list binaries
        run: ls -la binaries/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/rem-*
          generate_release_notes: true
